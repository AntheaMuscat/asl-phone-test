<!DOCTYPE html>
<html>
<head>
  <title>ASL Phone Hand Detection</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    video, canvas {
      position: absolute;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    #label {
      position: absolute;
      top: 10px;
      left: 10px;
      color: lime;
      background: rgba(0,0,0,0.6);
      padding: 8px 12px;
      font-size: 18px;
      z-index: 10;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="label">Starting camera...</div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const label = document.getElementById("label");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    const hands = new Hands({
      locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
      }
    });

    hands.setOptions({
      maxNumHands: 4,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });

    hands.onResults((results) => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

      let handCount = 0;

      if (results.multiHandLandmarks) {
        handCount = results.multiHandLandmarks.length;

        for (const landmarks of results.multiHandLandmarks) {
          drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {
            color: "#00FF00",
            lineWidth: 3
          });

          drawLandmarks(ctx, landmarks, {
            color: "#FF0000",
            lineWidth: 2,
            radius: 3
          });
        }
      }

      label.innerText = `Hands detected: ${handCount}`;
    });

    async function startBackCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: { exact: "environment" },
      width: { ideal: 1280 },
      height: { ideal: 720 }
    },
    audio: false
  });

  video.srcObject = stream;

  video.onloadedmetadata = () => {
    video.play();

    async function processFrame() {
      await hands.send({ image: video });
      requestAnimationFrame(processFrame);
    }

    processFrame();
  };
}

startBackCamera().catch(err => {
  label.innerText = "Back camera error: " + err.message;
});
  </script>
</body>
</html>
