<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASL Conversation Assistant</title>
  <style>
    body { margin:0; background:#000; overflow:hidden; font-family:Arial; }
    .container { display:flex; flex-direction:column; height:100vh; }
    .video-container { flex:1; position:relative; background:black; }
    video {
      width:100%;
      height:100%;
      object-fit: cover;
      transform: rotate(180deg) scaleX(-1);   /* Fix upside down + mirror */
    }
    .overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 8px;
      color: white;
      font-size: 18px;
    }
    .sign-box { margin: 6px 0; padding: 8px; border-radius: 6px; }
    .self  { background: #0066cc; }
    .other { background: #cc6600; }
    .controls {
      padding: 12px;
      background: #222;
      text-align: center;
    }
    button {
      padding: 12px 18px;
      margin: 5px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="video-container">
      <video id="video" autoplay playsinline></video>
      
      <div class="overlay">
        <div class="sign-box self" id="selfSign">You: <strong>—</strong></div>
        <div class="sign-box other" id="otherSign">Other: <strong>—</strong></div>
      </div>
    </div>

    <div class="controls">
      <button onclick="finishSentence('self')">Finish You</button>
      <button onclick="finishSentence('other')">Finish Other</button>
      <button onclick="clearAll()">Clear All</button>
    </div>
  </div>

  <script>
    let video = document.getElementById('video');

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },  // Rear camera
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        });
        video.srcObject = stream;
        console.log("✅ Rear camera started");
      } catch (e) {
        console.error("Camera error", e);
        alert("Could not access camera");
      }
    }

    function finishSentence(role) {
      alert(`Final sentence committed for ${role}`);
    }

    function clearAll() {
      document.getElementById('selfSign').innerHTML = 'You: <strong>—</strong>';
      document.getElementById('otherSign').innerHTML = 'Other: <strong>—</strong>';
    }

    // Start camera when page loads
    window.onload = startCamera;
  </script>
</body>
</html>
