<!DOCTYPE html>
<html>
<head>
  <title>ASL Recorder (Phone)</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial;
    }

    video, canvas {
      position: absolute;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    #label {
      position: absolute;
      top: 20px;
      left: 20px;
      color: lime;
      background: rgba(0,0,0,0.7);
      padding: 20px;
      font-size: 32px;
      font-weight: bold;
      border-radius: 12px;
      z-index: 10;
      white-space: pre-line;
    }
  </style>
</head>

<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="label">Waiting...</div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const label = document.getElementById("label");

    const API_URL = "http://192.168.0.78:5000";
    const COMMAND_URL = API_URL + "/get_command";
    const SAVE_URL = API_URL + "/save_sequence";

    const SEQ_LENGTH = 30;
    const SELF_RATIO = 0.65;

    let sequence = [];
    let recording = false;
    let selectedLabel = "none";
    let statusText = "Waiting...";

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    function getHandSize(landmarks) {
      let minX = 1, maxX = 0, minY = 1, maxY = 0;

      for (const p of landmarks) {
        minX = Math.min(minX, p.x);
        maxX = Math.max(maxX, p.x);
        minY = Math.min(minY, p.y);
        maxY = Math.max(maxY, p.y);
      }

      return (maxX - minX) * (maxY - minY);
    }

    function flatten(landmarks) {
      const arr = [];
      for (const p of landmarks) {
        arr.push(p.x, p.y, p.z);
      }
      return arr;
    }

    function makeTwoHandFrame(selfHands) {
      let frame = [];

      for (let i = 0; i < 2; i++) {
        if (selfHands[i]) {
          frame = frame.concat(flatten(selfHands[i]));
        } else {
          frame = frame.concat(new Array(63).fill(0));
        }
      }

      return frame; // 126
    }

    async function saveSequence() {
      try {
        await fetch(SAVE_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            label: selectedLabel,
            sequence: sequence
          })
        });

        statusText = `Saved: ${selectedLabel}`;
      } catch {
        statusText = "Save error";
      }
    }

    // 🔥 CHECK COMMAND FROM LAPTOP
    async function checkCommand() {
      try {
        const res = await fetch(COMMAND_URL);
        const data = await res.json();

        if (data.record && data.label && !recording) {
          selectedLabel = data.label;
          sequence = [];
          recording = true;
          statusText = `Recording ${selectedLabel}...`;
        }
      } catch (e) {
        console.log("Command error");
      }
    }

    setInterval(checkCommand, 500);

    const hands = new Hands({
      locateFile: file =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 4,
      modelComplexity: 1,
      minDetectionConfidence: 0.3,
      minTrackingConfidence: 0.3
    });

    hands.onResults(results => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // slight zoom-out for better framing
      const scale = 0.75;
      const w = canvas.width * scale;
      const h = canvas.height * scale;

      ctx.drawImage(
        results.image,
        (canvas.width - w) / 2,
        (canvas.height - h) / 2,
        w,
        h
      );

      let selfHands = [];

      if (results.multiHandLandmarks) {
        const handsData = results.multiHandLandmarks.map(l => ({
          landmarks: l,
          size: getHandSize(l)
        }));

        const maxSize = Math.max(...handsData.map(h => h.size));

        for (const hand of handsData) {
          const isSelf = hand.size >= maxSize * SELF_RATIO;

          if (isSelf) {
            selfHands.push(hand.landmarks);
          }

          drawConnectors(ctx, hand.landmarks, HAND_CONNECTIONS, {
            color: isSelf ? "#00FF00" : "#00AAFF",
            lineWidth: 3
          });

          drawLandmarks(ctx, hand.landmarks, {
            color: isSelf ? "#FF0000" : "#FFFF00",
            radius: 3
          });
        }

        if (recording && selfHands.length > 0) {
          const frame = makeTwoHandFrame(selfHands);

          sequence.push(frame);

          if (sequence.length >= SEQ_LENGTH) {
            recording = false;
            saveSequence();
          }
        }

      } else {
        // reset if hands disappear during recording
        if (recording) {
          recording = false;
          sequence = [];
          statusText = "Reset (no hands)";
        }
      }

      label.innerText =
        `${statusText}\n` +
        `Frames: ${sequence.length}/${SEQ_LENGTH}`;
    });

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        },
        audio: false
      });

      video.srcObject = stream;

      video.onloadedmetadata = () => {
        video.play();

        async function loop() {
          await hands.send({ image: video });
          requestAnimationFrame(loop);
        }

        loop();
      };
    }

    startCamera().catch(err => {
      label.innerText = "Camera error: " + err.message;
    });
  </script>
</body>
</html>
