<!DOCTYPE html>
<html>
<head>
  <title>ASL Dual User Recognition</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial;
    }

    video, canvas {
      position: absolute;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    #label {
      position: absolute;
      top: 20px;
      left: 20px;
      color: lime;
      background: rgba(0,0,0,0.75);
      padding: 20px;
      font-size: 30px;
      font-weight: bold;
      border-radius: 12px;
      z-index: 10;
      white-space: pre-line;
      line-height: 1.35;
    }
  </style>
</head>

<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="label">Waiting...</div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const label = document.getElementById("label");

    const API_URL = "http://192.168.0.78:5000";
    const COMMAND_URL = API_URL + "/get_command";
    const SAVE_URL = API_URL + "/save_sequence";
    const PREDICT_URL = API_URL + "/predict_dual";

    const SEQ_LENGTH = 30;

    let recordSequence = [];

    let selfPredictSequence = [];
    let otherPredictSequence = [];

    let recording = false;
    let selectedLabel = "none";
    let statusText = "Waiting...";

    let selfPredictionText = "Waiting...";
    let otherPredictionText = "Waiting...";

    let predicting = false;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    function getHandSize(landmarks) {
      let minX = 1, maxX = 0, minY = 1, maxY = 0;

      for (const p of landmarks) {
        minX = Math.min(minX, p.x);
        maxX = Math.max(maxX, p.x);
        minY = Math.min(minY, p.y);
        maxY = Math.max(maxY, p.y);
      }

      return (maxX - minX) * (maxY - minY);
    }

    function flatten(landmarks) {
      const arr = [];

      for (const p of landmarks) {
        arr.push(p.x, p.y, p.z);
      }

      return arr;
    }

    function makeTwoHandFrame(handsArray) {
      let frame = [];

      for (let i = 0; i < 2; i++) {
        if (handsArray[i]) {
          frame = frame.concat(flatten(handsArray[i]));
        } else {
          frame = frame.concat(new Array(63).fill(0));
        }
      }

      return frame;
    }

    async function saveSequence() {
      try {
        const res = await fetch(SAVE_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            label: selectedLabel,
            sequence: recordSequence
          })
        });

        const data = await res.json();

        if (data.error) {
          statusText = "Save error: " + data.error;
        } else {
          statusText = `Saved: ${selectedLabel}`;
        }
      } catch (e) {
        statusText = "Save error";
      }

      recordSequence = [];
    }

    async function sendPrediction(selfSequence, otherSequence) {
      try {
        const res = await fetch(PREDICT_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            self_sequence: selfSequence,
            other_sequence: otherSequence
          })
        });

        const data = await res.json();

        if (data.error) {
          selfPredictionText = "Prediction error";
          otherPredictionText = "Prediction error";
        } else {
          selfPredictionText =
            `${data.self.label} (${(data.self.confidence * 100).toFixed(1)}%)`;

          otherPredictionText =
            `${data.other.label} (${(data.other.confidence * 100).toFixed(1)}%)`;
        }
      } catch (e) {
        selfPredictionText = "Server error";
        otherPredictionText = "Server error";
      }
    }

    async function checkCommand() {
      try {
        const res = await fetch(COMMAND_URL);
        const data = await res.json();

        if (data.record && data.label && !recording) {
          selectedLabel = data.label;
          recordSequence = [];
          recording = true;
          statusText = `Recording ${selectedLabel}...`;
        }
      } catch (e) {
        console.log("Command error");
      }
    }

    setInterval(checkCommand, 500);

    const hands = new Hands({
      locateFile: file =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 4,
      modelComplexity: 1,
      minDetectionConfidence: 0.3,
      minTrackingConfidence: 0.3
    });

    hands.onResults(results => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const scale = 0.75;
      const w = canvas.width * scale;
      const h = canvas.height * scale;

      ctx.drawImage(
        results.image,
        (canvas.width - w) / 2,
        (canvas.height - h) / 2,
        w,
        h
      );

      let selfHands = [];
      let otherHands = [];

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        let detectedHands = results.multiHandLandmarks.map(l => ({
          landmarks: l,
          size: getHandSize(l)
        }));

        detectedHands.sort((a, b) => b.size - a.size);

        if (detectedHands.length > 0) {
          selfHands.push(detectedHands[0].landmarks);
        }

        if (detectedHands.length > 1) {
          otherHands.push(detectedHands[1].landmarks);
        }

        if (detectedHands.length > 2) {
          otherHands.push(detectedHands[2].landmarks);
        }

        for (const hand of detectedHands) {
          const isSelf = selfHands.includes(hand.landmarks);

          drawConnectors(ctx, hand.landmarks, HAND_CONNECTIONS, {
            color: isSelf ? "#00FF00" : "#00AAFF",
            lineWidth: 3
          });

          drawLandmarks(ctx, hand.landmarks, {
            color: isSelf ? "#FF0000" : "#FFFF00",
            radius: 3
          });
        }

        const selfFrame = makeTwoHandFrame(selfHands);
        const otherFrame = makeTwoHandFrame(otherHands);

        if (recording && selfHands.length > 0) {
          recordSequence.push(selfFrame);

          if (recordSequence.length >= SEQ_LENGTH) {
            recording = false;
            saveSequence();
          }
        }

        if (!recording) {
          selfPredictSequence.push(selfFrame);
          otherPredictSequence.push(otherFrame);

          if (selfPredictSequence.length > SEQ_LENGTH) {
            selfPredictSequence.shift();
          }

          if (otherPredictSequence.length > SEQ_LENGTH) {
            otherPredictSequence.shift();
          }

          if (
            selfPredictSequence.length === SEQ_LENGTH &&
            otherPredictSequence.length === SEQ_LENGTH &&
            !predicting
          ) {
            predicting = true;

            sendPrediction(
              [...selfPredictSequence],
              [...otherPredictSequence]
            ).finally(() => {
              predicting = false;
            });
          }
        }

      } else {
        selfPredictSequence = [];
        otherPredictSequence = [];

        selfPredictionText = "No hands";
        otherPredictionText = "No hands";

        if (recording) {
          recording = false;
          recordSequence = [];
          statusText = "Reset: no hands";
        }
      }

      label.innerText =
        `${statusText}\n` +
        `Record: ${recordSequence.length}/${SEQ_LENGTH}\n` +
        `SELF: ${selfPredictSequence.length}/${SEQ_LENGTH} → ${selfPredictionText}\n` +
        `OTHER: ${otherPredictSequence.length}/${SEQ_LENGTH} → ${otherPredictionText}`;
    });

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        },
        audio: false
      });

      video.srcObject = stream;

      video.onloadedmetadata = () => {
        video.play();

        async function loop() {
          await hands.send({ image: video });
          requestAnimationFrame(loop);
        }

        loop();
      };
    }

    startCamera().catch(err => {
      label.innerText = "Camera error: " + err.message;
    });
  </script>
</body>
</html>
