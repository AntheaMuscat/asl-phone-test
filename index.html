<!DOCTYPE html>
<html>
<head>
  <title>ASL Recognition</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial;
    }

    video, canvas {
      position: absolute;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    #label {
      position: absolute;
      top: 10px;
      left: 10px;
      color: lime;
      background: rgba(0,0,0,0.6);
      padding: 10px;
      font-size: 18px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="label">Starting...</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const label = document.getElementById("label");

const API_URL = "http://192.168.0.78:5000/predict";

const SEQ_LENGTH = 30;
const SELF_RATIO = 0.65;

let selfSequence = [];
let lastPrediction = "Waiting...";

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

function getHandSize(landmarks) {
  let minX = 1, maxX = 0, minY = 1, maxY = 0;

  for (const p of landmarks) {
    minX = Math.min(minX, p.x);
    maxX = Math.max(maxX, p.x);
    minY = Math.min(minY, p.y);
    maxY = Math.max(maxY, p.y);
  }

  return (maxX - minX) * (maxY - minY);
}

function flatten(landmarks) {
  let arr = [];
  for (const p of landmarks) {
    arr.push(p.x, p.y, p.z);
  }
  return arr;
}

async function sendPrediction(sequence) {
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ sequence })
    });

    const data = await res.json();
    lastPrediction = `${data.label} (${(data.confidence*100).toFixed(1)}%)`;
  } catch (e) {
    lastPrediction = "Server error";
  }
}

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 6,
  minDetectionConfidence: 0.4,
  minTrackingConfidence: 0.4
});

hands.onResults(results => {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(results.image,0,0,canvas.width,canvas.height);

  let selfHands = 0;
  let otherHands = 0;

  if (results.multiHandLandmarks) {

    const handsData = results.multiHandLandmarks.map(l => ({
      landmarks: l,
      size: getHandSize(l)
    }));

    const maxSize = Math.max(...handsData.map(h => h.size));

    for (const hand of handsData) {

      const isSelf = hand.size >= maxSize * SELF_RATIO;
      const flat = flatten(hand.landmarks);

      if (isSelf) {
        selfHands++;

        selfSequence.push(flat);
        if (selfSequence.length > SEQ_LENGTH) selfSequence.shift();

        if (selfSequence.length === SEQ_LENGTH) {
          sendPrediction(selfSequence);
        }

      } else {
        otherHands++;
      }

      drawConnectors(ctx, hand.landmarks, HAND_CONNECTIONS, {
        color: isSelf ? "#00FF00" : "#00AAFF",
        lineWidth: 3
      });

      drawLandmarks(ctx, hand.landmarks, {
        color: isSelf ? "#FF0000" : "#FFFF00",
        radius: 3
      });
    }
  }

  label.innerText =
    `You: ${selfHands} | Other: ${otherHands}\n` +
    `Seq: ${selfSequence.length}/${SEQ_LENGTH}\n` +
    `Prediction: ${lastPrediction}`;
});

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: "environment" } },
    audio: false
  });

  video.srcObject = stream;

  video.onloadedmetadata = () => {
    video.play();

    async function loop() {
      await hands.send({ image: video });
      requestAnimationFrame(loop);
    }

    loop();
  };
}

startCamera();
</script>

</body>
</html>
