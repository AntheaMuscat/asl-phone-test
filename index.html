<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASL Conversation Assistant</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #111; color: white; }
    .container { display: flex; flex-direction: column; height: 100vh; }
    .video-container { flex: 1; position: relative; background: black; }
    video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    .overlay { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; }
    .sign-box { margin: 8px 0; padding: 10px; border-radius: 8px; }
    .self { background: #0066cc; }
    .other { background: #cc6600; }
    .controls { padding: 15px; background: #222; text-align: center; }
    button { padding: 12px 20px; margin: 5px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; }
    .finish { background: #28a745; color: white; }
    .clear { background: #dc3545; color: white; }
  </style>
</head>
<body>
  <div class="container">
    <div class="video-container">
      <video id="video" autoplay playsinline></video>
      
      <div class="overlay">
        <div class="sign-box self" id="selfSign">You: <strong>—</strong></div>
        <div class="sign-box other" id="otherSign">Other: <strong>—</strong></div>
      </div>
    </div>

    <div class="controls">
      <button class="finish" onclick="finishSentence('self')">Finish You</button>
      <button class="finish" onclick="finishSentence('other')">Finish Other</button>
      <button class="clear" onclick="clearAll()">Clear All</button>
    </div>
  </div>

  <script>
    let selfSequence = [];
    let otherSequence = [];
    const video = document.getElementById('video');
    let stream = null;

    async function startCamera() {
      stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
    }

    // This will be called from MediaPipe (you need to add MediaPipe code)
    function onResults(results) {
      // TODO: Add your MediaPipe hand landmark code here
      // For now, this is placeholder
      console.log("Landmarks received");
    }

    function finishSentence(role) {
      alert(`Final sentence for ${role} committed!`);
      // You can extend this to build full sentences
    }

    function clearAll() {
      selfSequence = [];
      otherSequence = [];
      document.getElementById('selfSign').innerHTML = 'You: <strong>—</strong>';
      document.getElementById('otherSign').innerHTML = 'Other: <strong>—</strong>';
    }

    startCamera();
  </script>
</body>
</html>
