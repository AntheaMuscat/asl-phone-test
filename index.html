<!DOCTYPE html>
<html>
<head>
  <title>ASL Cardboard Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    :root {
      --self: #62ff9f;
      --other: #5bdcff;
      --pink: #ff8edb;
      --warn: #ffcf5a;
      --glass: rgba(0,0,0,.24);
      --line: rgba(255,255,255,.14);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    video, canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      transform: translateZ(0);
    }

    video {
      opacity: 0;
    }

    #hud {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .lensLine {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 1px;
      background: rgba(255,255,255,.12);
    }

    .topStatus {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
    }

    .pill {
      background: var(--glass);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 10px;
      font-weight: 900;
      backdrop-filter: blur(8px);
    }

    .connected {
      color: var(--self);
    }

    .disconnected {
      color: #ff6f8c;
    }

    .zoneHint {
      position: absolute;
      top: 36px;
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      background: rgba(0,0,0,.2);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
    }

    #selfHint {
      left: 6vw;
      color: var(--self);
    }

    #otherHint {
      right: 6vw;
      color: var(--other);
    }

    .floatingLabel {
      position: absolute;
      bottom: 12px;
      background: var(--glass);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 13px;
      font-weight: 900;
      backdrop-filter: blur(8px);
      max-width: 28vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #selfFloating {
      left: 6vw;
      border-color: rgba(98,255,159,.5);
    }

    #otherFloating {
      right: 6vw;
      border-color: rgba(91,220,255,.5);
    }

    .wordRow {
      position: absolute;
      bottom: 46px;
      width: 28vw;
      display: flex;
      gap: 4px;
    }

    #selfWords {
      left: 6vw;
    }

    #otherWords {
      right: 6vw;
      justify-content: flex-end;
    }

    .chip {
      background: rgba(255,255,255,.12);
      border-radius: 999px;
      padding: 4px 7px;
      font-size: 9px;
      font-weight: 900;
    }

    .centerActions {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
      pointer-events: auto;
    }

    .centerActions button {
      border: none;
      border-radius: 999px;
      padding: 6px 8px;
      font-size: 9px;
      font-weight: 900;
      background: rgba(255,255,255,.75);
      color: black;
    }

    .clear {
      background: var(--pink) !important;
      color: white !important;
    }

    #toast {
      position: absolute;
      top: 62px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.55);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 10px;
      font-weight: 900;
      opacity: 0;
      transition: .2s;
      backdrop-filter: blur(8px);
    }

    #toast.show {
      opacity: 1;
    }

    .recordBar {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 170px;
      height: 7px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,.18);
      display: none;
    }

    .recording .recordBar {
      display: block;
    }

    .recordFill {
      height: 100%;
      width: 0%;
      background: var(--pink);
    }

  </style>
</head>

<body>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="hud">

    <div class="lensLine"></div>

    <div class="topStatus">
      <div id="connection" class="pill disconnected">Backend checking...</div>
      <div id="fpsBadge" class="pill">FPS —</div>
    </div>

    <div id="selfHint" class="zoneHint">Near Camera = You</div>
    <div id="otherHint" class="zoneHint">Far From Camera = Other</div>

    <div id="selfWords" class="wordRow"></div>
    <div id="otherWords" class="wordRow"></div>

    <div id="selfFloating" class="floatingLabel">You: —</div>
    <div id="otherFloating" class="floatingLabel">Other: —</div>

    <div class="centerActions">
      <button onclick="finishSentence('self')">Finish You</button>
      <button onclick="finishSentence('other')">Finish Other</button>
      <button onclick="switchCamera()">Swap Camera</button>
      <button class="clear" onclick="clearAll()">Clear</button>
    </div>

    <div class="recordBar">
      <div id="recordFill" class="recordFill"></div>
    </div>

    <div id="toast"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <script>

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let currentFacingMode = "environment";
    let currentStream = null;

    const API_URL = "http://192.168.0.78:5000";

    const HEALTH_URL = API_URL + "/health";
    const PREDICT_URL = API_URL + "/predict";
    const COMMAND_URL = API_URL + "/get_command";
    const SAVE_URL = API_URL + "/save_sequence";

    const SEQ_LENGTH = 30;

    const LONG_RECORD_SECONDS = 15;
    const TARGET_FPS = 20;
    const LONG_RECORD_FRAMES = LONG_RECORD_SECONDS * TARGET_FPS;

    let recording = false;
    let savingRecording = false;
    let selectedLabel = null;
    let selectedRole = "self";
    let recordSequence = [];

    let roles = {
      self: makeRole("self"),
      other: makeRole("other")
    };

    function makeRole(role) {
      return {
        role,
        sequence: [],
        liveLabel: "—",
        confidence: 0,
        words: []
      };
    }

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    function toast(msg) {
      const el = document.getElementById("toast");
      el.innerText = msg;
      el.classList.add("show");

      setTimeout(() => {
        el.classList.remove("show");
      }, 1400);
    }

    function nice(label) {
      return (label || "—").replaceAll("_", " ");
    }

    function getBox(landmarks) {

      let minX = 1;
      let maxX = 0;
      let minY = 1;
      let maxY = 0;

      for (const p of landmarks) {
        minX = Math.min(minX, p.x);
        maxX = Math.max(maxX, p.x);
        minY = Math.min(minY, p.y);
        maxY = Math.max(maxY, p.y);
      }

      return {
        minX,
        maxX,
        minY,
        maxY,
        area: (maxX - minX) * (maxY - minY)
      };
    }

    function flatten(landmarks) {

      const arr = [];

      for (const p of landmarks) {
        arr.push(p.x, p.y, p.z);
      }

      return arr;
    }

    function makeTwoHandFrame(hands) {

      let frame = [];

      for (let i = 0; i < 2; i++) {

        if (hands[i]) {
          frame = frame.concat(flatten(hands[i]));
        } else {
          frame = frame.concat(new Array(63).fill(0));
        }

      }

      return frame;
    }

    function assignRoles(handsData) {

      const grouped = {
        self: [],
        other: []
      };

      for (const h of handsData) {

        const closeToCamera = h.box.area > 0.06;

        let role = closeToCamera ? "self" : "other";

        grouped[role].push(h.landmarks);

      }

      grouped.self = grouped.self.slice(0, 2);
      grouped.other = grouped.other.slice(0, 2);

      return grouped;
    }

    async function checkBackend() {

      const el = document.getElementById("connection");

      try {

        const res = await fetch(HEALTH_URL);
        const data = await res.json();

        el.innerText = `Connected · ${data.labels.length} words`;
        el.className = "pill connected";

      } catch {

        el.innerText = "Backend offline";
        el.className = "pill disconnected";

      }
    }

    async function checkCommand() {

      try {

        const res = await fetch(COMMAND_URL);
        const data = await res.json();

        if (data.record && data.label && !recording && !savingRecording) {

          selectedLabel = data.label;
          selectedRole = data.role || "self";

          recordSequence = [];
          recording = true;

          document.body.classList.add("recording");

          toast(`Recording ${nice(selectedLabel)}`);

        }

      } catch {}

    }

    async function saveSequence() {

      if (savingRecording) return;

      savingRecording = true;
      recording = false;

      const labelToSave = selectedLabel;
      const roleToSave = selectedRole;
      const sequenceToSave = recordSequence

      recordSequence = [];

      document.body.classList.remove("recording");

      try {

        const res = await fetch(SAVE_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            label: labelToSave,
            role: roleToSave,
            sequence: sequenceToSave
          })
        });

        const data = await res.json();

        if (res.ok) {
          toast(`Saved ${nice(labelToSave)}`);
        } else {
          toast("Save error");
        }

      } catch {

        toast("Backend save failed");

      }

      savingRecording = false;
    }

    async function sendPrediction(roleName) {

      const state = roles[roleName];

      if (state.sequence.length < SEQ_LENGTH) return;

      try {

        const res = await fetch(PREDICT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            sequence: [...state.sequence]
          })
        });

        const data = await res.json();

        state.liveLabel = nice(data.label);
        state.confidence = Math.round((data.confidence || 0) * 100);

        updateUI(roleName);

      } catch {}

    }

    function updateUI(roleName) {

      const s = roles[roleName];

      const label =
        `${roleName === "self" ? "You" : "Other"}: ${s.liveLabel} ${s.confidence}%`;

      document.getElementById(
        roleName === "self"
          ? "selfFloating"
          : "otherFloating"
      ).innerText = label;
    }

    function finishSentence(role) {}

    function clearAll() {

      roles = {
        self: makeRole("self"),
        other: makeRole("other")
      };

      updateUI("self");
      updateUI("other");

      toast("Cleared");
    }

    setInterval(checkBackend, 2500);
    setInterval(checkCommand, 500);

    checkBackend();

    const hands = new Hands({
      locateFile: file =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 4,
      modelComplexity: 1,
      minDetectionConfidence: 0.45,
      minTrackingConfidence: 0.45
    });

    hands.onResults(async (results) => {

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const shouldMirror = currentFacingMode === "user";

      ctx.save();

      if (shouldMirror) {
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
      }

      ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

      const handsData = (results.multiHandLandmarks || []).map(l => ({
        landmarks: l,
        box: getBox(l)
      }));

      const grouped = assignRoles(handsData);

      for (const roleName of ["self", "other"]) {

        const handsForRole = grouped[roleName];

        if (handsForRole.length) {

          const frame = makeTwoHandFrame(handsForRole);

          if (recording && selectedRole === roleName) {

            recordSequence.push(frame);

            document.getElementById("recordFill").style.width =
              `${Math.min(100, (recordSequence.length / LONG_RECORD_FRAMES) * 100)}%`;

            if (recordSequence.length >= LONG_RECORD_FRAMES && !savingRecording) {
              saveSequence();
            }

          }

          roles[roleName].sequence.push(frame);

          if (roles[roleName].sequence.length > SEQ_LENGTH) {
            roles[roleName].sequence.shift();
          }

          sendPrediction(roleName);

        }

      }

      for (const h of handsData) {

        const isSelf = grouped.self.includes(h.landmarks);

        const color = isSelf
          ? "#62ff9f"
          : "#5bdcff";

        drawConnectors(ctx, h.landmarks, HAND_CONNECTIONS, {
          color,
          lineWidth: 3
        });

        drawLandmarks(ctx, h.landmarks, {
          color: "#ffffff",
          radius: 2
        });

      }

      ctx.restore();

    });

    async function startCamera(facingMode = currentFacingMode) {

      try {

        if (currentStream) {
          currentStream.getTracks().forEach(track => track.stop());
        }

        currentFacingMode = facingMode;

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: {
              ideal: facingMode
            },
            width: {
              ideal: 1280
            },
            height: {
              ideal: 720
            }
          },
          audio: false
        });

        currentStream = stream;

        video.srcObject = stream;

        video.onloadedmetadata = () => {

          video.play();

          async function loop() {

            if (video.readyState >= 2) {
              await hands.send({
                image: video
              });
            }

            requestAnimationFrame(loop);

          }

          loop();

        };

        toast(
          facingMode === "environment"
            ? "Back camera active"
            : "Front camera active"
        );

      } catch (err) {

        toast("Camera error: " + err.message);

      }

    }

    async function switchCamera() {

      const next =
        currentFacingMode === "environment"
          ? "user"
          : "environment";

      await startCamera(next);

    }

    startCamera();

  </script>

</body>
</html>
