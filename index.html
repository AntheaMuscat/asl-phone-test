<!DOCTYPE html>
<html>
<head>
  <title>ASL Dual User Recognition</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    video, canvas {
      position: absolute;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    #label {
      position: absolute;
      top: 20px;
      left: 20px;
      color: lime;
      background: rgba(0, 0, 0, 0.75);
      padding: 18px;
      font-size: 28px;
      font-weight: bold;
      border-radius: 12px;
      z-index: 10;
      white-space: pre-line;
      line-height: 1.4;
    }

    #status {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      background: rgba(0, 0, 0, 0.65);
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      z-index: 10;
    }
  </style>
</head>

<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="label">Waiting for hands...</div>
  <div id="status">Phone/Cardboard POV Mode</div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const label = document.getElementById("label");
    const statusBox = document.getElementById("status");

    let lastSendTime = 0;
    const SEND_INTERVAL = 120; // milliseconds

    let selfHistory = [];
    let otherHistory = [];
    const HISTORY_LIMIT = 5;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function getHandBox(hand) {
      const xs = hand.map(lm => lm.x);
      const ys = hand.map(lm => lm.y);

      return {
        minX: Math.min(...xs),
        maxX: Math.max(...xs),
        minY: Math.min(...ys),
        maxY: Math.max(...ys)
      };
    }

    function getHandSize(hand) {
      const box = getHandBox(hand);
      const width = box.maxX - box.minX;
      const height = box.maxY - box.minY;
      return width * height;
    }

    function getAverageY(hand) {
      return hand.reduce((sum, lm) => sum + lm.y, 0) / hand.length;
    }

    function getAverageX(hand) {
      return hand.reduce((sum, lm) => sum + lm.x, 0) / hand.length;
    }

    function classifyHandsForPOV(allHands) {
      const selfHands = [];
      const otherHands = [];

      if (!allHands || allHands.length === 0) {
        return { selfHands, otherHands };
      }

      const enriched = allHands.map(hand => {
        return {
          hand: hand,
          size: getHandSize(hand),
          avgY: getAverageY(hand),
          avgX: getAverageX(hand)
        };
      });

      /*
        POV/Cardboard logic:
        SELF = wearer hands, usually closer to camera, larger, and lower in frame.
        OTHER = person in front, usually smaller and more central/upper.
      */

      enriched.forEach(item => {
        const isVeryClose = item.size > 0.075;
        const isLowerFrame = item.avgY > 0.56;
        const isMediumCloseAndLow = item.size > 0.045 && item.avgY > 0.48;

        if (isVeryClose || isLowerFrame || isMediumCloseAndLow) {
          selfHands.push(item.hand);
        } else {
          otherHands.push(item.hand);
        }
      });

      /*
        Safety fallback:
        If all hands were classified as SELF and there are 3–4 hands,
        keep the largest/lower hands as SELF and move smaller/upper hands to OTHER.
      */
      if (selfHands.length > 2 && otherHands.length === 0) {
        const sorted = enriched.sort((a, b) => {
          const scoreA = a.size + (a.avgY * 0.05);
          const scoreB = b.size + (b.avgY * 0.05);
          return scoreB - scoreA;
        });

        selfHands.length = 0;
        otherHands.length = 0;

        sorted.forEach((item, index) => {
          if (index < 2) {
            selfHands.push(item.hand);
          } else {
            otherHands.push(item.hand);
          }
        });
      }

      return { selfHands, otherHands };
    }

    function smoothPrediction(history, prediction) {
      if (!prediction || !prediction.label) {
        return prediction;
      }

      history.push(prediction);

      if (history.length > HISTORY_LIMIT) {
        history.shift();
      }

      const counts = {};
      let best = prediction;

      history.forEach(p => {
        if (!p || !p.label) return;

        if (!counts[p.label]) {
          counts[p.label] = {
            label: p.label,
            count: 0,
            confidenceSum: 0
          };
        }

        counts[p.label].count += 1;
        counts[p.label].confidenceSum += Number(p.confidence || 0);
      });

      Object.values(counts).forEach(item => {
        const avgConfidence = item.confidenceSum / item.count;

        if (
          item.count > (counts[best.label]?.count || 0) ||
          (item.count === (counts[best.label]?.count || 0) && avgConfidence > Number(best.confidence || 0))
        ) {
          best = {
            label: item.label,
            confidence: avgConfidence.toFixed(1)
          };
        }
      });

      return best;
    }

    function formatPrediction(name, prediction) {
      if (!prediction || !prediction.label) {
        return `${name}: waiting...`;
      }

      const confidence = Number(prediction.confidence || 0);

      if (prediction.label === "none" || confidence < 60) {
        return `${name}: unsure`;
      }

      return `${name}: ${prediction.label} (${confidence.toFixed(1)}%)`;
    }

    function drawHand(hand, color) {
      const points = hand.map(lm => {
        return {
          x: lm.x * canvas.width,
          y: lm.y * canvas.height
        };
      });

      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 3;

      points.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
        ctx.fill();
      });

      const connections = [
        [0,1],[1,2],[2,3],[3,4],
        [0,5],[5,6],[6,7],[7,8],
        [0,9],[9,10],[10,11],[11,12],
        [0,13],[13,14],[14,15],[15,16],
        [0,17],[17,18],[18,19],[19,20],
        [5,9],[9,13],[13,17]
      ];

      connections.forEach(([a, b]) => {
        ctx.beginPath();
        ctx.moveTo(points[a].x, points[a].y);
        ctx.lineTo(points[b].x, points[b].y);
        ctx.stroke();
      });
    }

    async function sendForPrediction(selfHands, otherHands) {
      try {
        const response = await fetch("/predict_dual", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            selfHands: selfHands,
            otherHands: otherHands
          })
        });

        if (!response.ok) {
          throw new Error("Prediction request failed");
        }

        const data = await response.json();

        const smoothSelf = smoothPrediction(selfHistory, data.self);
        const smoothOther = smoothPrediction(otherHistory, data.other);

        label.innerText =
          formatPrediction("YOU", smoothSelf) + "\n" +
          formatPrediction("OTHER", smoothOther);

      } catch (error) {
        label.innerText = "Backend not connected";
        console.error(error);
      }
    }

    function onResults(results) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        label.innerText = "Waiting for hands...";
        statusBox.innerText = "No hands detected";
        return;
      }

      const { selfHands, otherHands } = classifyHandsForPOV(results.multiHandLandmarks);

      selfHands.forEach(hand => drawHand(hand, "lime"));
      otherHands.forEach(hand => drawHand(hand, "cyan"));

      statusBox.innerText =
        `Detected hands: ${results.multiHandLandmarks.length} | YOU: ${selfHands.length} | OTHER: ${otherHands.length}`;

      const now = Date.now();

      if (now - lastSendTime > SEND_INTERVAL) {
        lastSendTime = now;
        sendForPrediction(selfHands, otherHands);
      }
    }

    const hands = new Hands({
      locateFile: file => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
      }
    });

    hands.setOptions({
      maxNumHands: 4,
      modelComplexity: 1,
      minDetectionConfidence: 0.65,
      minTrackingConfidence: 0.65
    });

    hands.onResults(onResults);

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });

        video.srcObject = stream;

        video.onloadedmetadata = () => {
          video.play();

          const camera = new Camera(video, {
            onFrame: async () => {
              await hands.send({ image: video });
            },
            width: 1280,
            height: 720
          });

          camera.start();
        };

      } catch (error) {
        label.innerText = "Camera permission error";
        console.error(error);
      }
    }

    startCamera();
  </script>
</body>
</html>
