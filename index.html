<!DOCTYPE html>
<html>
<head>
  <title>ASL Cardboard Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    :root {
      --self: #62ff9f;
      --other: #5bdcff;
      --pink: #ff8edb;
      --warn: #ffcf5a;
      --glass: rgba(0, 0, 0, 0.24);
      --glass-strong: rgba(0, 0, 0, 0.46);
      --line: rgba(255, 255, 255, 0.14);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    video, canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    video {
      opacity: 0;
    }

    #hud {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .lensLine {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 1px;
      background: rgba(255,255,255,.10);
    }

    .topStatus {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .pill {
      background: var(--glass);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 10px;
      font-weight: 900;
      backdrop-filter: blur(8px);
      white-space: nowrap;
    }

    .connected {
      color: var(--self);
    }

    .disconnected {
      color: #ff6f8c;
    }

    .zoneHint {
      position: absolute;
      top: 35px;
      font-size: 9px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      background: rgba(0,0,0,.16);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      backdrop-filter: blur(6px);
    }

    #selfHint {
      left: 6vw;
      color: var(--self);
    }

    #otherHint {
      right: 6vw;
      color: var(--other);
    }

    .floatingLabel {
      position: absolute;
      bottom: 12px;
      background: var(--glass);
      border: 1px solid var(--line);
      backdrop-filter: blur(8px);
      color: white;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      max-width: 28vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #selfFloating {
      left: 6vw;
      border-color: rgba(98,255,159,.55);
    }

    #otherFloating {
      right: 6vw;
      border-color: rgba(91,220,255,.55);
    }

    .wordRow {
      position: absolute;
      bottom: 46px;
      width: 28vw;
      display: flex;
      gap: 5px;
      overflow: hidden;
    }

    #selfWords {
      left: 6vw;
    }

    #otherWords {
      right: 6vw;
      justify-content: flex-end;
    }

    .chip {
      background: rgba(255,255,255,.11);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 999px;
      padding: 4px 7px;
      font-size: 9px;
      font-weight: 900;
      white-space: nowrap;
    }

    .centerActions {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
      pointer-events: auto;
    }

    .centerActions button {
      border: none;
      border-radius: 999px;
      padding: 6px 8px;
      font-size: 9px;
      font-weight: 900;
      background: rgba(255,255,255,.72);
      color: #061014;
    }

    .centerActions .clear {
      background: var(--pink);
      color: white;
    }

    #toast {
      position: absolute;
      left: 50%;
      top: 60px;
      transform: translateX(-50%);
      background: var(--glass-strong);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 11px;
      font-size: 10px;
      font-weight: 900;
      opacity: 0;
      transition: opacity .2s ease;
      backdrop-filter: blur(8px);
      max-width: 68vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #toast.show {
      opacity: 1;
    }

    .modeBadge {
      position: absolute;
      left: 50%;
      bottom: 46px;
      transform: translateX(-50%);
      background: rgba(255, 207, 90, 0.20);
      color: var(--warn);
      border: 1px solid rgba(255, 207, 90, 0.42);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 9px;
      font-weight: 900;
      opacity: 0;
      transition: opacity .18s ease;
      backdrop-filter: blur(8px);
    }

    .modeBadge.show {
      opacity: 1;
    }
  </style>
</head>

<body>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="hud">

    <div class="lensLine"></div>

    <div class="topStatus">
      <div id="connection" class="pill disconnected">Backend checking...</div>
      <div id="fpsBadge" class="pill">FPS —</div>
    </div>

    <div id="selfHint" class="zoneHint">Close / Lower = You</div>
    <div id="otherHint" class="zoneHint">Far / Upper = Other</div>

    <div id="selfWords" class="wordRow"></div>
    <div id="otherWords" class="wordRow"></div>

    <div id="selfFloating" class="floatingLabel">You: — 0%</div>
    <div id="otherFloating" class="floatingLabel">Other: — 0%</div>

    <div id="modeBadge" class="modeBadge">SELF CLOSE MODE</div>

    <div class="centerActions">
      <button onclick="finishSentence('self')">Finish You</button>
      <button onclick="finishSentence('other')">Finish Other</button>
      <button onclick="switchCamera()">Swap Camera</button>
      <button class="clear" onclick="clearAll()">Clear</button>
    </div>

    <div id="toast"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <script>

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let currentFacingMode = "environment";
    let currentStream = null;

    const API_URL = "http://192.168.0.78:5000";

    const HEALTH_URL = API_URL + "/health";
    const PREDICT_URL = API_URL + "/predict";

    const SEQ_LENGTH = 30;
    const PREDICT_EVERY_MS = 240;

    const CONFIRM_THRESHOLD = 0.74;

    let lastFrameTime = performance.now();
    let selfCloseMode = false;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    function toast(msg) {
      const el = document.getElementById("toast");
      el.innerText = msg;
      el.classList.add("show");

      setTimeout(() => {
        el.classList.remove("show");
      }, 1400);
    }

    function getBox(landmarks) {
      let minX = 1;
      let maxX = 0;
      let minY = 1;
      let maxY = 0;

      for (const p of landmarks) {
        minX = Math.min(minX, p.x);
        maxX = Math.max(maxX, p.x);
        minY = Math.min(minY, p.y);
        maxY = Math.max(maxY, p.y);
      }

      return {
        minX,
        maxX,
        minY,
        maxY,
        cx: (minX + maxX) / 2,
        cy: (minY + maxY) / 2,
        area: (maxX - minX) * (maxY - minY)
      };
    }

    function flatten(landmarks) {
      const arr = [];

      for (const p of landmarks) {
        arr.push(p.x, p.y, p.z);
      }

      return arr;
    }

    function makeTwoHandFrame(hands) {
      let frame = [];

      hands.sort((a, b) => getBox(a).cx - getBox(b).cx);

      for (let i = 0; i < 2; i++) {
        if (hands[i]) {
          frame = frame.concat(flatten(hands[i]));
        } else {
          frame = frame.concat(new Array(63).fill(0));
        }
      }

      return frame;
    }

    function assignRoles(handsData) {

      const grouped = {
        self: [],
        other: []
      };

      selfCloseMode = false;

      for (const h of handsData) {

        const closeToCamera = h.box.area > 0.055;
        const lowerSelfZone = h.box.cy > 0.52;

        let role;

        if (closeToCamera || lowerSelfZone) {
          role = "self";
          selfCloseMode = true;
        } else {
          role = "other";
        }

        grouped[role].push(h.landmarks);
      }

      grouped.self = grouped.self.slice(0, 2);
      grouped.other = grouped.other.slice(0, 2);

      document
        .getElementById("modeBadge")
        .classList.toggle("show", selfCloseMode);

      return grouped;
    }

    async function checkBackend() {

      const el = document.getElementById("connection");

      try {

        const res = await fetch(HEALTH_URL);
        const data = await res.json();

        el.innerText = `Connected · ${data.labels.length} words`;
        el.className = "pill connected";

      } catch {

        el.innerText = "Backend offline";
        el.className = "pill disconnected";
      }
    }

    setInterval(checkBackend, 2500);
    checkBackend();

    const hands = new Hands({
      locateFile: file =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 4,
      modelComplexity: 1,
      minDetectionConfidence: 0.45,
      minTrackingConfidence: 0.45
    });

    hands.onResults(results => {

      const now = performance.now();

      const fps = Math.round(
        1000 / Math.max(1, now - lastFrameTime)
      );

      lastFrameTime = now;

      document.getElementById("fpsBadge").innerText = `FPS ${fps}`;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

      const handsData = (results.multiHandLandmarks || []).map(l => ({
        landmarks: l,
        box: getBox(l)
      }));

      const grouped = assignRoles(handsData);

      for (const h of handsData) {

        const isSelf = grouped.self.includes(h.landmarks);

        const color = isSelf
          ? "#62ff9f"
          : "#5bdcff";

        drawConnectors(ctx, h.landmarks, HAND_CONNECTIONS, {
          color,
          lineWidth: isSelf && selfCloseMode ? 4 : 3
        });

        drawLandmarks(ctx, h.landmarks, {
          color: "#ffffff",
          radius: isSelf && selfCloseMode ? 3 : 2
        });
      }
    });

    async function startCamera(facingMode = currentFacingMode) {

      try {

        if (currentStream) {
          currentStream
            .getTracks()
            .forEach(track => track.stop());
        }

        currentFacingMode = facingMode;

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: facingMode },
            width: { ideal: 1280 },
            height: { ideal: 720 },
            aspectRatio: { ideal: 16 / 9 }
          },
          audio: false
        });

        currentStream = stream;

        video.srcObject = stream;

        video.onloadedmetadata = () => {

          video.play();

          async function loop() {

            if (video.readyState >= 2) {
              await hands.send({ image: video });
            }

            requestAnimationFrame(loop);
          }

          loop();
        };

        toast(
          facingMode === "environment"
            ? "Back camera active"
            : "Front camera active"
        );

      } catch (err) {

        toast("Camera error: " + err.message);
      }
    }

    async function switchCamera() {

      const next =
        currentFacingMode === "environment"
          ? "user"
          : "environment";

      await startCamera(next);
    }

    function finishSentence(role) {
      toast(`Finished ${role}`);
    }

    function clearAll() {
      toast("Cleared");
    }

    startCamera();

  </script>

</body>
</html>
